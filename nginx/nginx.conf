upstream biostock_api {
    server api:3000;
    keepalive 32;
}

# Configuración de rate limiting para prevenir abusos en red interna
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;  # Acepta cualquier hostname / IP local

    # ── Seguridad básica ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # ── Compresión ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Client-side routing: siempre devolver index.html
        try_files $uri $uri/ /index.html;

        # Cache agresivo para assets con hash (Vite los genera con hash en nombre)
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API REST ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://biostock_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Rate limit más estricto en login para prevenir brute force
    location /api/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://biostock_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebSocket (Socket.io para realtime) ───────────────────────────────────
    location /socket.io/ {
        proxy_pass http://biostock_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # 24h — mantener conexiones WS largas
        proxy_send_timeout 86400s;
    }

    # ── Health check (acceso directo, sin rate limit) ─────────────────────────
    location /health {
        proxy_pass http://biostock_api/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Bloquear acceso a archivos sensibles ──────────────────────────────────
    location ~ /\.(env|git|ht) {
        deny all;
        return 404;
    }
}
